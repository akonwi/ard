name: Release Binaries

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26"
          cache: true

      - name: Download dependencies
        working-directory: compiler
        run: go mod download

      - name: Run tests
        working-directory: compiler
        run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26"
          cache: true

      - name: Download dependencies
        working-directory: compiler
        run: go mod download

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
        working-directory: compiler
        run: |
          go build \
            -ldflags="-X github.com/akonwi/ard/version.Version=${VERSION}" \
            -o ard \
            .

      - name: Package binary
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          TAR_NAME="ard_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
          tar -czf "dist/${TAR_NAME}" -C compiler ard

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ard_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: ard_${{ github.ref_name }}_*
          merge-multiple: true

      - name: Generate checksums
        run: |
          sha256sum dist/*.tar.gz > dist/checksums.txt

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          body: |
            Cross-compiled Ard binaries for version ${{ github.ref_name }}

            Commit: ${{ github.sha }}

  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: ard_${{ github.ref_name }}_*
          merge-multiple: true

      - name: Generate checksums
        run: |
          sha256sum dist/*.tar.gz > dist/checksums.txt

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: akonwi/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Ard formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          SEMVER="${VERSION#v}"
          DARWIN_AMD64_SHA="$(grep "ard_${VERSION}_darwin_amd64.tar.gz" dist/checksums.txt | awk '{print $1}')"
          DARWIN_ARM64_SHA="$(grep "ard_${VERSION}_darwin_arm64.tar.gz" dist/checksums.txt | awk '{print $1}')"
          LINUX_AMD64_SHA="$(grep "ard_${VERSION}_linux_amd64.tar.gz" dist/checksums.txt | awk '{print $1}')"
          LINUX_ARM64_SHA="$(grep "ard_${VERSION}_linux_arm64.tar.gz" dist/checksums.txt | awk '{print $1}')"

          cat > homebrew-tap/Formula/ard.rb <<FORMULA
          class Ard < Formula
            desc "Programming language and compiler"
            homepage "https://github.com/akonwi/ard"
            version "${SEMVER}"
            license "MIT"

            if OS.mac?
              if Hardware::CPU.arm?
                url "https://github.com/akonwi/ard/releases/download/${VERSION}/ard_${VERSION}_darwin_arm64.tar.gz"
                sha256 "${DARWIN_ARM64_SHA}"
              else
                url "https://github.com/akonwi/ard/releases/download/${VERSION}/ard_${VERSION}_darwin_amd64.tar.gz"
                sha256 "${DARWIN_AMD64_SHA}"
              end
            elsif OS.linux?
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/akonwi/ard/releases/download/${VERSION}/ard_${VERSION}_linux_arm64.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              else
                url "https://github.com/akonwi/ard/releases/download/${VERSION}/ard_${VERSION}_linux_amd64.tar.gz"
                sha256 "${LINUX_AMD64_SHA}"
              end
            end

            def install
              bin.install "ard"
            end

            test do
              assert_match "${VERSION}", shell_output("#{bin}/ard version")
            end
          end
          FORMULA

      - name: Commit and push formula update
        working-directory: homebrew-tap
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Formula/ard.rb; then
            echo "Formula/ard.rb is already up to date"
            exit 0
          fi

          git add Formula/ard.rb
          git commit -m "ard ${VERSION}"
          git push
