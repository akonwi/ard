name: test-compiler

on:
  pull_request:

concurrency:
  group: test-compiler-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-compiler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26"
          cache: true

      - name: Run compiler unit tests
        working-directory: compiler
        run: go test -tags=goexperiment.jsonv2 ./...

      - name: Standard Libary tests
        working-directory: compiler
        run: go run -tags=goexperiment.jsonv2 main.go test std_lib

  test-go-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26"
          cache: true

      - name: Run Go backend integration tests
        working-directory: compiler
        run: go test -tags=goexperiment.jsonv2 ./go -count=1

  test-examples:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26"
          cache: true

      - name: Build Ard CLI for examples
        working-directory: compiler
        run: go build -tags=goexperiment.jsonv2 -o "$RUNNER_TEMP/ard" .

      - name: Run tic-tac-toe PTY smoke test
        working-directory: examples/tic-tac-toe
        env:
          ARD: ${{ runner.temp }}/ard
        run: ./test_tic_tac_toe.py
